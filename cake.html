<style>
/* Global */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Arial Rounded MT Bold", Arial, sans-serif;
}

body {
  background: linear-gradient(135deg, #ffcce6, #c4e0ff);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  position: relative;
}

/* Floating Balloons */
.balloon {
  position: absolute;
  width: 32px;
  height: 40px;
  border-radius: 50%;
  animation: float 15s infinite ease-in-out;
  z-index: 1;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-100px); opacity: 0; }
}

/* Confetti */
.confetti {
  position: absolute;
  width: 8px;
  height: 8px;
  opacity: 0;
  animation: confettiFall 5s infinite ease-out;
  z-index: 1;
}

@keyframes confettiFall {
  0% { transform: translateY(-10vh) rotate(0); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* Cake Container */
.cake-container {
  position: relative;
  width: clamp(180px, 50vw, 300px);
  height: clamp(180px, 50vw, 300px);
  margin-bottom: 20px;
  z-index: 10;
}

/* Cake Base */
.cake {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 70%;
  height: 45%;
  background: linear-gradient(to right, #ff85a2, #ff99b6);
  border-radius: 12px 12px 0 0;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.cake:before {
  content: "";
  position: absolute;
  top: -20%;
  width: 100%;
  height: 20%;
  background: linear-gradient(to right, #fc6c85, #ff85a2);
  border-radius: 12px 12px 0 0;
}

.cake:after {
  content: "";
  position: absolute;
  top: -33%;
  left: 10%;
  width: 80%;
  height: 13%;
  background: linear-gradient(to right, #ffb3c6, #ffcce6);
  border-radius: 10px;
}

/* Frosting */
.frosting {
  position: absolute;
  top: -35%;
  left: 15%;
  width: 70%;
  height: 6px;
  background: white;
  border-radius: 5px;
}

/* Decorations */
.decoration {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

/* Candles */
.candle-container {
  position: absolute;
  top: -38%;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: clamp(10px, 3vw, 20px);
}

.candle {
  position: relative;
  width: clamp(5px, 1.2vw, 8px);
  height: clamp(22px, 6vw, 30px);
  background: linear-gradient(to top, #ffff99, #ff9933);
  border-radius: 4px;
  cursor: pointer;
  transition: .3s ease;
}

.flame {
  position: absolute;
  top: -70%;
  left: 50%;
  transform: translateX(-50%);
  width: clamp(10px, 2vw, 14px);
  height: clamp(16px, 3vw, 20px);
  background: radial-gradient(ellipse at center, #ffff00, #ff9900, #ff6600);
  border-radius: 50% 50% 30% 30%;
  animation: flicker .5s infinite alternate;
}

@keyframes flicker {
  0% { transform: translateX(-50%) scale(1); }
  100% { transform: translateX(-50%) scale(1.1); }
}

.candle.blown .flame {
  opacity: 0;
  animation: none;
}

/* Smoke */
.smoke {
  position: absolute;
  top: -60%;
  left: 50%;
  width: 6px;
  height: 0;
  background: rgba(200,200,200,0.5);
  border-radius: 10px;
  opacity: 0;
}

.candle.blown .smoke {
  height: 30px;
  opacity: 0.7;
  animation: smokeRise 2s forwards;
}

@keyframes smokeRise {
  0% { height: 0; opacity: 0; }
  20% { opacity: 0.7; }
  100% { height: 30px; opacity: 0; transform: translateY(-20px); }
}

/* Wish Message Popup */
.wish-message {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 85%;
  max-width: 350px;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(255,255,255,0.95);
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(255,105,180,0.8);
  text-align: center;
  opacity: 0;
  transition: .4s ease;
}

.wish-message.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
  animation: bounceIn .6s;
}

@keyframes bounceIn {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); }
}

/* Buttons */
.nav-buttons {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.btn {
  padding: 10px 20px;
  background: linear-gradient(to right, #ff85a2, #ff3366);
  color: white;
  border-radius: 30px;
  border: none;
  font-size: clamp(14px, 4vw, 18px);
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(255, 51, 102, 0.4);
}

/* Ultra-small screens like Galaxy Fold */
@media (max-width: 320px) {
  .cake-container { width: 160px; height: 160px; }
  .candle-container { top: -40%; }
}
</style>

    <script>
      // Global variables
      let candlesBlown = 0;
      let totalCandles = 0;
      let allCandlesBlown = false;


      // Initialize the page when it loads
      document.addEventListener("DOMContentLoaded", function () {

        
    const candleElements = document.querySelectorAll(".candle");
    totalCandles = candleElements.length;  // FIX: AUTO-DETECT

        createBalloons();
        createConfetti();
        createDecorations();

   

        // Add event listeners for candle interaction
        document.querySelectorAll(".candle").forEach((candle) => {
          candle.addEventListener("click", blowOutCandle);
          candle.addEventListener("touchstart", blowOutCandle); // Better for mobile
          candle.addEventListener("mouseover", function (e) {
            if (e.buttons === 0) {
              // Only trigger on hover when not clicking
              blowOutCandle.call(this);
            }
          });
        });

        // For better mobile experience with touch
        document.addEventListener("touchmove", function (e) {
          const touch = e.touches[0];
          const element = document.elementFromPoint(
            touch.clientX,
            touch.clientY
          );
          if (
            element &&
            element.classList.contains("candle") &&
            !element.classList.contains("blown")
          ) {
            blowOutCandle.call(element);
          }
        });

        // Optional: Listen for keyboard input
        document.addEventListener("keypress", function (e) {
          if (e.key === "b" || e.key === "B") {
            // Press 'b' to simulate blowing
            blowRandomCandle();
          }
        });
      });
      
      // Create floating balloons
      function createBalloons() {
        const colors = ["#ff66b3", "#66ccff", "#ff9966", "#99ff66", "#cc99ff"];
        const numBalloons = 10;

        for (let i = 0; i < numBalloons; i++) {
          const balloon = document.createElement("div");
          balloon.className = "balloon";
          balloon.style.backgroundColor =
            colors[Math.floor(Math.random() * colors.length)];
          balloon.style.left = `${Math.random() * 100}%`;
          balloon.style.animationDuration = `${15 + Math.random() * 10}s`;
          balloon.style.animationDelay = `${Math.random() * 5}s`;
          document.body.appendChild(balloon);
        }
      }

      // Create confetti pieces
      function createConfetti() {
        const colors = ["#ffcc00", "#ff66b3", "#66ccff", "#ff9966", "#99ff66"];
        const numConfetti = 50;

        for (let i = 0; i < numConfetti; i++) {
          const confetti = document.createElement("div");
          confetti.className = "confetti";
          confetti.style.backgroundColor =
            colors[Math.floor(Math.random() * colors.length)];
          confetti.style.left = `${Math.random() * 100}%`;
          confetti.style.width = `${5 + Math.random() * 5}px`;
          confetti.style.height = `${5 + Math.random() * 10}px`;
          confetti.style.animationDuration = `${3 + Math.random() * 4}s`;
          confetti.style.animationDelay = `${Math.random() * 5}s`;
          document.body.appendChild(confetti);
        }
      }

      // Create cake decorations
      function createDecorations() {
        const cake = document.querySelector(".cake");
        const colors = ["#ff3366", "#ffcc00", "#66ccff", "#ff9966", "#99ff66"];
        const numDecorations = 10;

        for (let i = 0; i < numDecorations; i++) {
          const decoration = document.createElement("div");
          decoration.className = "decoration";
          decoration.style.backgroundColor =
            colors[Math.floor(Math.random() * colors.length)];
          decoration.style.top = `${-20 - Math.random() * 50}px`;
          decoration.style.left = `${Math.random() * 100}%`;
          cake.appendChild(decoration);
        }
      }

      // Blow out a candle when clicked or hovered
      function blowOutCandle() {
        if (!this.classList.contains("blown")) {
          this.classList.add("blown");
          candlesBlown++;

          // Create sparkle effect
          createSparkleEffect(this);

          // Check if all candles are blown
          if (candlesBlown === totalCandles && !allCandlesBlown) {
            allCandlesBlown = true;
            setTimeout(showWishMessage, 1000);
          }
        }
      }

      // Simulate blowing a random candle
      function blowRandomCandle() {
        const unblownCandles = Array.from(
          document.querySelectorAll(".candle:not(.blown)")
        );
        if (unblownCandles.length > 0) {
          const randomCandle =
            unblownCandles[Math.floor(Math.random() * unblownCandles.length)];
          blowOutCandle.call(randomCandle);
        }
      }

      // Create sparkle effect around the blown candle
      function createSparkleEffect(candle) {
        const numSparkles = 10;
        const candleRect = candle.getBoundingClientRect();

        for (let i = 0; i < numSparkles; i++) {
          const sparkle = document.createElement("div");
          sparkle.className = "sparkle";
          sparkle.style.left = `${
            candleRect.left + Math.random() * candleRect.width
          }px`;
          sparkle.style.top = `${
            candleRect.top + Math.random() * (candleRect.height / 2)
          }px`;
          sparkle.style.animation = `sparkle ${
            0.5 + Math.random() * 0.5
          }s forwards`;
          document.body.appendChild(sparkle);

          // Remove sparkle after animation
          setTimeout(() => {
            sparkle.remove();
          }, 1000);
        }
      }

      // Show the wish message when all candles are blown
      function showWishMessage() {
        document.getElementById("wishMessage").classList.add("show");
        createFireworks();
      }

      // Close the wish message
      function closeWishMessage() {
        document.getElementById("wishMessage").classList.remove("show");
      }

      // Create fireworks effect
      function createFireworks() {
        const numFireworks = 10;
        const colors = ["#ff3366", "#ffcc00", "#66ccff", "#ff9966", "#99ff66"];

        for (let i = 0; i < numFireworks; i++) {
          setTimeout(() => {
            const firework = document.createElement("div");
            firework.className = "firework";
            firework.style.left = `${10 + Math.random() * 80}%`;
            firework.style.top = `${10 + Math.random() * 60}%`;
            firework.style.backgroundColor =
              colors[Math.floor(Math.random() * colors.length)];
            firework.style.animation = `firework ${
              1 + Math.random()
            }s forwards`;
            document.body.appendChild(firework);

            // Remove firework after animation
            setTimeout(() => {
              firework.remove();
            }, 2000);
          }, i * 300);
        }
      }

      // Navigation functions

        window.location.href = "letter.html";
      }
    </script>
