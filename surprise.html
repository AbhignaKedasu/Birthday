<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Cake!</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        min-height: 100vh;              /* FIXED */
        overflow-x: hidden;             /* FIXED */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    .container {
        text-align: center;
        width: 100%;
        max-width: 700px;
        padding: 2rem;
        background-color: rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        backdrop-filter: blur(5px);
        box-shadow: 0 8px 32px rgba(255, 105, 180, 0.3);
    }

    h1 {
        font-size: 2.2rem;              /* MOBILE FRIENDLY */
        color: #FF1493;
        margin-bottom: 1rem;
        animation: bounce-in 1.5s forwards;
    }

    .subtitle {
        font-size: 1.1rem;              /* MOBILE FRIENDLY */
        color: #8A2BE2;
        margin-bottom: 1.8rem;
        white-space: normal;            /* FIXED WRAPPING */
    }

    .next-button {
        padding: 1rem 2rem;
        font-size: 1.3rem;
        border-radius: 50px;
        background: linear-gradient(45deg, #FF1493, #8A2BE2);
        color: white;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .next-button:hover {
        transform: scale(1.05);
    }

    /* Simple keyframes */
    @keyframes bounce-in {
        0% { transform: scale(0); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    /* Floating elements layer */
    #effects-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
        z-index: 1;
    }

    .float-item {
        position: absolute;
        font-size: 20px;
    }

    @media (max-width: 480px) {
        h1 { font-size: 1.8rem; }
        .subtitle { font-size: 1rem; }
        .next-button { font-size: 1.1rem; padding: 0.8rem 1.5rem; }
    }
</style>
</head>

<body>

<div id="effects-layer"></div>

<div class="container">
    <h1>Birthday Cake is waiting for you! <br> Akka 🎉🎂</h1>

    <div class="subtitle">
      Click to continue!
    </div>

    <button class="next-button" onclick="goToNextPage()">Let's Go! ✨</button>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>

<script>

function goToNextPage() {
    gsap.to('.next-button', {
        scale: 1.2,
        yoyo: true,
        repeat: 1,
        duration: 0.3,
        onComplete: () => {
            window.location.href = "cake.html";
        }
    });
}

function createFloating() {
    const layer = document.getElementById("effects-layer");
    const icons = ["🎈", "✨", "❤️", "★"];
    
    for (let i = 0; i < 20; i++) {
        const el = document.createElement("div");
        el.classList.add("float-item");
        el.innerHTML = icons[Math.floor(Math.random() * icons.length)];

        el.style.left = Math.random() * 100 + "vw";
        el.style.top = "110vh";

        layer.appendChild(el);

        gsap.to(el, {
            y: -200,
            duration: Math.random() * 4 + 4,
            opacity: 0,
            ease: "power1.out",
            onComplete: () => el.remove()
        });
    }
}

setInterval(createFloating, 1500);
createFloating();

</script>

</body>
</html>
